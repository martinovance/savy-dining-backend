name: Deploy Go Backend to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Fix and Build
      run: |
        rm -f go.sum
        go mod tidy
        GOOS=linux GOARCH=amd64 go build -o main ./cmd/api

    - name: Deploy binary to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "main"
        target: "/home/ec2-user/app"

    - name: Configure and Restart Service on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          mkdir -p /home/ec2-user/app
          chmod +x /home/ec2-user/app/main
          
          # Force kill any process holding port 8080 to ensure old version is gone
          sudo fuser -k 8080/tcp || true
          
          # Create systemd service file with absolute paths
          cat <<EOF | sudo tee /etc/systemd/system/savy-backend.service
          [Unit]
          Description=Savy Dining Go Backend
          After=network.target

          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/home/ec2-user/app
          Environment="DATABASE_URL=${{ secrets.DATABASE_URL }}"
          Environment="PORT=8080"
          Environment="GIN_MODE=release"
          ExecStart=/home/ec2-user/app/main
          Restart=always
          RestartSec=5
          StandardOutput=append:/home/ec2-user/app/app.log
          StandardError=append:/home/ec2-user/app/app.log

          [Install]
          WantedBy=multi-user.target
          EOF

          # Reload and restart service
          sudo systemctl daemon-reload
          sudo systemctl enable savy-backend
          sudo systemctl restart savy-backend
          
          # Wait a few seconds and check if it's actually running
          sleep 5
          if ! sudo systemctl is-active --quiet savy-backend; then
            echo "ERROR: savy-backend service failed to start. Last 20 lines of log:"
            tail -n 20 /home/ec2-user/app/app.log
            exit 1
          fi
          echo "Service is running successfully."
