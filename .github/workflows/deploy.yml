name: Deploy Go Backend to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Fix and Build
      run: |
        rm -f go.sum
        go mod tidy
        GOOS=linux GOARCH=amd64 go build -o main ./cmd/api

    - name: Deploy binary to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "main"
        target: "/home/ec2-user/app"

    - name: Configure and Restart Service on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          mkdir -p /home/ec2-user/app
          chmod +x /home/ec2-user/app/main
          
          # Create systemd service file with absolute paths
          # Added sslmode=disable to ensure connection without SSL certificates
          cat <<EOF | sudo tee /etc/systemd/system/savy-backend.service
          [Unit]
          Description=Savy Dining Go Backend
          After=network.target

          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/home/ec2-user/app
          Environment="DATABASE_URL=${{ secrets.DATABASE_URL }}?sslmode=disable"
          Environment="PORT=8080"
          Environment="GIN_MODE=release"
          ExecStart=/home/ec2-user/app/main
          Restart=always
          RestartSec=5
          StandardOutput=append:/home/ec2-user/app/app.log
          StandardError=append:/home/ec2-user/app/app.log

          [Install]
          WantedBy=multi-user.target
          EOF

          # Reload and restart service
          sudo systemctl daemon-reload
          sudo systemctl enable savy-backend
          sudo systemctl restart savy-backend
          
          # Validation: Wait and check health endpoint
          echo "Waiting for service to stabilize..."
          sleep 10
          if ! curl -s --fail http://localhost:8080/api/v1/health; then
            echo "CRITICAL ERROR: Service is not responding on port 8080. Logs:"
            tail -n 50 /home/ec2-user/app/app.log
            exit 1
          fi
          echo "Deployment successful: API is reachable."
