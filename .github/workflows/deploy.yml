name: Deploy Go Backend to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true

    - name: Build
      run: |
        go mod download
        GOOS=linux GOARCH=amd64 go build -o main .

    - name: Deploy binary to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "main"
        target: "/home/ec2-user/app"

    - name: Restart Service on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          mkdir -p /home/ec2-user/app
          chmod +x /home/ec2-user/app/main
          # Kill existing process if running on port 8080
          fuser -k 8080/tcp || true
          nohup /home/ec2-user/app/main > /home/ec2-user/app/app.log 2>&1 &
